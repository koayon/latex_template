default_language_version:
  python: python3.10
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-shebang-scripts-are-executable
      - id: check-yaml
      - id: check-merge-conflict
      - id: debug-statements
      - id: no-commit-to-branch
        args: ["--branch=main"]
        stages:
          - pre-commit

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.4
    hooks:
      - id: ruff
        types_or: [python, pyi, jupyter]
        args: [--fix]

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3.10

  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout

  # ── LaTeX linting (ChkTeX) ──────────────────────────────────────────
  - repo: local
    hooks:
      - id: chktex
        name: chktex – LaTeX linter
        entry: chktex
        args:
          - "-q" # quiet – only show warnings
          - "-l" # use local .chktexrc
          - ".chktexrc"
          - "--inputfiles=0" # don't chase \input/\import
        language: system
        files: '\.tex$'
        types: [file]

  # ── LaTeX formatting (tex-fmt) ────────────────────────────────────────
  # Rust-based, zero-dependency LaTeX formatter
  # https://github.com/WGUNDERWOOD/tex-fmt
  - repo: local
    hooks:
      - id: tex-fmt
        name: tex-fmt – LaTeX formatter
        entry: tex-fmt
        language: system
        files: '\.tex$'
        types: [file]
